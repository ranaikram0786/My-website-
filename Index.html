<!DOCTYPE html>
<html>

<head>
<title>Rayla Online Shop</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

h1{
background:#2c7a7b;
color:white;
padding:15px;
}

.product{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 0 8px gray;
display:inline-block;
width:250px;
}

button{
background:#2c7a7b;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#225e61;
}

</style>

</head>

<body>

<h1>My Online Shop</h1>

<div class="product">
<h2>Flower Plant</h2>
<p>Price: $5</p>
<button>Buy Now</button>
</div>

<div class="product">
<h2>English Book</h2>
<p>Price: $10</p>
<button>Buy Now</button>
</div>

<div class="product">
<h2>Notebook</h2>
<p>Price: $3</p>
<button>Buy Now</button>
</div>

</body>

</html>
